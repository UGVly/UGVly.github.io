<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Temporarily Unavailable</title>
    <meta name="robots" content="noindex,nofollow,noarchive" />
    <style>
      :root {
        --bg: #121524;
        --panel: rgba(20, 24, 40, 0.84);
        --text: #f5f2ff;
        --muted: #c9c1e6;
        --line: rgba(245, 242, 255, 0.12);
        --accent: #b5a1ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(255, 159, 199, 0.14), transparent 24%),
          radial-gradient(circle at 88% 15%, rgba(143, 180, 255, 0.18), transparent 24%),
          radial-gradient(circle at 45% 100%, rgba(181, 161, 255, 0.12), transparent 30%),
          linear-gradient(180deg, #101321 0%, var(--bg) 50%, #171a2b 100%);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .notice {
        width: min(640px, 100%);
        padding: 40px 32px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--panel);
        backdrop-filter: blur(18px);
        box-shadow: 0 28px 72px rgba(0, 0, 0, 0.32);
      }

      .eyebrow {
        margin: 0 0 14px;
        color: var(--accent);
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 6vw, 3.2rem);
        line-height: 1.08;
      }

      p {
        margin: 18px 0 0;
        color: var(--muted);
        font-size: 1.02rem;
        line-height: 1.8;
      }
    </style>
  </head>
  <body>
    <main class="notice">
      <p class="eyebrow">404 / Offline</p>
      <h1>页面暂不可访问</h1>
      <p>该站点目前处于临时关闭状态，因此这个页面没有对外提供。</p>
      <p>This page is unavailable because the site is temporarily offline.</p>
    </main>
  </body>
</html>
